    padding: 8px 12px; border-radius: 6px 6px 0 0; margin-bottom: 0;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #111; border-radius: 0 0 6px 6px; overflow: hidden; }
  th { padding: 8px 12px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: #555; text-align: right; background: #0d0d0d; border-bottom: 1px solid #1a1a1a; }
  th:first-child { text-align: left; }
  td { padding: 9px 12px; border-bottom: 1px solid #1a1a1a; text-align: right; }
  td:first-child { text-align: left; color: #ccc; }
  td.symbol { color: #555; font-size: 11px; }
  td.current { color: #fff; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #161616; }
  .up { color: #4caf50; }
  .down { color: #f44336; }
  .neutral { color: #888; }
  .bar { display: inline-block; width: 36px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
  .legend { display: flex; gap: 16px; margin-bottom: 16px; font-size: 11px; color: #555; align-items: center; }
  .legend span { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; }
  .highlight-row td { background: #151515; }
  .col-1d { color: #aaa; }
</style>
</head>

<script>
function cell(val) {
  if (val === null || val === undefined) return '<td class="neutral">—</td>';
  const cls = val > 0 ? 'up' : val < 0 ? 'down' : 'neutral';
  const arrow = val > 0 ? '▲' : val < 0 ? '▼' : '—';
  return `<td class="${cls}">${arrow} ${Math.abs(val).toFixed(2)}%</td>`;
}

function renderSection(title, color, bg, rows) {
  let html = `<div class="section">
    <div class="section-title" style="background:${bg};color:${color}">${title}</div>
    <table>
      <thead><tr>
        <th>Instrument</th><th>Symbol</th><th>Current</th>
        <th>1D</th><th>1W</th><th>1M</th><th>6M</th><th>1Y</th>
      </tr></thead><tbody>`;
  rows.forEach(r => {
    const c = r.changes || {};
    html += `<tr>
      <td>${r.name}</td>
      <td class="symbol">${r.symbol}</td>
      <td class="current">${r.current !== null ? r.current.toLocaleString() : '—'}</td>
      ${cell(c['1D'])}${cell(c['1W'])}${cell(c['1M'])}${cell(c['6M'])}${cell(c['1Y'])}
    </tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}
